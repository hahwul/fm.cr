---
name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Crystal
        run: brew install crystal
      - name: Install dependencies
        run: shards install
      - name: Run tests
        run: crystal spec
